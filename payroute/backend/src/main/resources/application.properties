spring.application.name=payroute-backend
server.port=8080

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/payroute}
spring.datasource.username=${DATABASE_USER:coder}
spring.datasource.password=${DATABASE_PASSWORD:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# PayRoute config
payroute.webhook.secret=${WEBHOOK_SECRET:dev-webhook-secret-change-in-production}
payroute.fx.quote-ttl-minutes=${FX_QUOTE_TTL_MINUTES:5}
payroute.provider.base-url=${PROVIDER_BASE_URL:http://mock-provider}

# Logging
logging.level.com.payroute=DEBUG
logging.level.org.springframework.web=INFO
